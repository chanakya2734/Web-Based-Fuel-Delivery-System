<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuelDash — Web-Based Fuel Delivery System</title>
    <meta name="description" content="FuelDash — On-demand fuel delivery at your doorstep. Login as Manager, Customer, or Delivery Partner.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 30%, #16213e 60%, #0f0f1a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background orbs */
        body::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 152, 0, 0.12) 0%, transparent 70%);
            top: -150px;
            right: -100px;
            border-radius: 50%;
            animation: floatOrb 8s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 87, 34, 0.08) 0%, transparent 70%);
            bottom: -100px;
            left: -80px;
            border-radius: 50%;
            animation: floatOrb 10s ease-in-out infinite reverse;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.1); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideDown {
            from { opacity: 0; max-height: 0; transform: translateY(-10px); }
            to { opacity: 1; max-height: 400px; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(255, 152, 0, 0); }
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .login-card {
            position: relative;
            z-index: 10;
            width: 420px;
            max-width: 92vw;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 48px 40px;
            animation: fadeInUp 0.8s ease-out;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 152, 0, 0.5), transparent);
        }

        /* Brand */
        .brand {
            text-align: center;
            margin-bottom: 36px;
        }

        .brand-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #ff9800, #ff5722);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(255, 152, 0, 0.3);
            animation: pulse 3s ease-in-out infinite;
        }

        .brand h1 {
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .brand p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.45);
            margin-top: 6px;
            font-weight: 300;
        }

        /* Error Toast */
        .error-toast {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeInUp 0.4s ease-out;
        }

        .error-toast span.icon { font-size: 18px; }
        .error-toast span.msg {
            color: #fca5a5;
            font-size: 13px;
            font-weight: 400;
        }

        /* Role Selector */
        .role-label {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            display: block;
        }

        .role-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 28px;
        }

        .role-btn {
            flex: 1;
            padding: 14px 8px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: rgba(255, 255, 255, 0.5);
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .role-btn .role-icon {
            font-size: 22px;
            transition: transform 0.3s ease;
        }

        .role-btn:hover {
            background: rgba(255, 152, 0, 0.08);
            border-color: rgba(255, 152, 0, 0.2);
            color: rgba(255, 255, 255, 0.8);
            transform: translateY(-2px);
        }

        .role-btn:hover .role-icon {
            transform: scale(1.15);
        }

        .role-btn.active {
            background: linear-gradient(135deg, rgba(255, 152, 0, 0.15), rgba(255, 87, 34, 0.1));
            border-color: rgba(255, 152, 0, 0.4);
            color: #ff9800;
            box-shadow: 0 4px 20px rgba(255, 152, 0, 0.15);
        }

        /* Form */
        .login-form {
            display: none;
            animation: slideDown 0.4s ease-out;
        }

        .login-form.active {
            display: block;
        }

        .input-group {
            margin-bottom: 18px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 7px;
            letter-spacing: 0.3px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .input-group input:focus {
            border-color: rgba(255, 152, 0, 0.5);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 0 3px rgba(255, 152, 0, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff9800, #f57c00);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
            margin-top: 8px;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            background-size: 200% 100%;
            animation: shimmer 3s ease-in-out infinite;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 152, 0, 0.35);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* Footer */
        .card-footer {
            text-align: center;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .card-footer p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.25);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
                border-radius: 20px;
            }
            .role-selector {
                gap: 6px;
            }
            .role-btn {
                padding: 12px 6px;
                font-size: 11px;
            }
            .brand h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <!-- Brand -->
        <div class="brand">
            <div class="brand-icon">⛽</div>
            <h1>FuelDash</h1>
            <p>On-demand fuel delivery at your doorstep</p>
        </div>

        <!-- Error Toast -->
        {% if error %}
        <div class="error-toast" id="errorToast">
            <span class="icon">⚠️</span>
            <span class="msg">{{ error }}</span>
        </div>
        {% endif %}

        <!-- Role Selector -->
        <span class="role-label">Login as</span>
        <div class="role-selector">
            <button class="role-btn" data-role="manager" onclick="selectRole('manager')" id="role-manager">
                <span class="role-icon">👔</span>
                Manager
            </button>
            <button class="role-btn" data-role="customer" onclick="selectRole('customer')" id="role-customer">
                <span class="role-icon">👤</span>
                Customer
            </button>
            <button class="role-btn" data-role="deliveryBoy" onclick="selectRole('deliveryBoy')" id="role-deliveryBoy">
                <span class="role-icon">🚚</span>
                Delivery
            </button>
        </div>

        <!-- Manager Form -->
        <div id="managerForm" class="login-form">
            <form action="/manager" method="post">
                <div class="input-group">
                    <label for="mgr-user">Username</label>
                    <input type="text" id="mgr-user" name="Username" placeholder="Enter your username" required>
                </div>
                <div class="input-group">
                    <label for="mgr-pass">Password</label>
                    <input type="password" id="mgr-pass" name="Password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="submit-btn">Sign in as Manager</button>
            </form>
        </div>

        <!-- Customer Form -->
        <div id="customerForm" class="login-form">
            <form action="/customer" method="post">
                <div class="input-group">
                    <label for="cust-user">Username</label>
                    <input type="text" id="cust-user" name="Username" placeholder="Enter your username" required>
                </div>
                <div class="input-group">
                    <label for="cust-pass">Password</label>
                    <input type="password" id="cust-pass" name="Password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="submit-btn">Sign in as Customer</button>
            </form>
        </div>

        <!-- Delivery Boy Form -->
        <div id="deliveryBoyForm" class="login-form">
            <form action="/delivery" method="post">
                <div class="input-group">
                    <label for="del-user">Username</label>
                    <input type="text" id="del-user" name="Username" placeholder="Enter your username" required>
                </div>
                <div class="input-group">
                    <label for="del-pass">Password</label>
                    <input type="password" id="del-pass" name="Password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="submit-btn">Sign in as Delivery Partner</button>
            </form>
        </div>

        <!-- Footer -->
        <div class="card-footer">
            <p>© 2026 FuelDash — Fuel Delivery System</p>
        </div>
    </div>

    <script>
        function selectRole(role) {
            // Deactivate all role buttons
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            // Activate selected
            document.querySelector(`[data-role="${role}"]`).classList.add('active');

            // Hide all forms
            document.querySelectorAll('.login-form').forEach(form => {
                form.classList.remove('active');
            });
            // Show selected form
            const targetForm = document.getElementById(role + 'Form');
            if (targetForm) {
                targetForm.classList.add('active');
                // Focus first input
                setTimeout(() => {
                    const firstInput = targetForm.querySelector('input');
                    if (firstInput) firstInput.focus();
                }, 300);
            }
        }

        // Auto-dismiss error toast after 5 seconds
        const errorToast = document.getElementById('errorToast');
        if (errorToast) {
            setTimeout(() => {
                errorToast.style.opacity = '0';
                errorToast.style.transform = 'translateY(-10px)';
                errorToast.style.transition = 'all 0.4s ease';
                setTimeout(() => errorToast.remove(), 400);
            }, 5000);
        }
    </script>
</body>
</html>
